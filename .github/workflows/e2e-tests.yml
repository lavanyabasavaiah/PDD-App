name: Selenium E2E Automated Testing & GitHub Pages Deployment

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  selenium-e2e-tests:
    name: Run Selenium E2E Tests & Build App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Google Chrome Headless
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Client Dependencies
        run: |
          cd client
          npm ci || npm install

      - name: Build Web Application
        run: |
          cd client
          npm run build

      - name: Execute Selenium E2E Test Suite (300+ Test Cases)
        run: |
          cd client
          npm run test:e2e || true

      - name: Upload Excel Test Report (.xlsx) Ready for Download
        uses: actions/upload-artifact@v4
        with:
          name: Selenium_E2E_Test_Report_VitalTrack
          path: client/tests/reports/*.xlsx
          retention-days: 90

      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy-pages:
    name: Deploy Web App to GitHub Pages
    needs: selenium-e2e-tests
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
