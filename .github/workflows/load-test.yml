name: Backend API k6 Load Testing Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'server/**'
      - '.github/workflows/load-test.yml'
  pull_request:
    branches: [ main, master ]

jobs:
  k6-api-load-test:
    name: Execute k6 API Load Test (100 VUs) & Publish Metrics
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup k6 Load Testing Engine
        uses: grafana/setup-k6-action@v1

      - name: Start Backend Server in Background (if needed)
        run: |
          if [ -d "server" ]; then
            cd server
            npm ci || npm install || true
            node server.js > /tmp/server.log 2>&1 &
            sleep 3
          fi

      - name: Execute k6 Load Test Performance Benchmark
        run: |
          k6 run --summary-export=summary.json server/scripts/load-test.js || true

      - name: Parse Metrics & Generate Excel Report
        run: |
          node server/scripts/parseK6Summary.cjs || true

      - name: Upload Excel Load Test Report (.xlsx) Ready for Download
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: K6_API_Load_Test_Report
          path: reports/*.xlsx
          retention-days: 90
