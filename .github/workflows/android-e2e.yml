name: Android Mobile Appium E2E Testing & Report Deployment

on:
  push:
    branches: [ main, master ]
    paths:
      - 'mobile/**'
      - '.github/workflows/android-e2e.yml'
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  android-e2e-tests:
    name: Run Android Emulator & Appium 1,111 E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Enable KVM Hardware Acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm-rules.rules
          sudo udevadm control --reload-rules && sudo udevadm trigger --name-match=kvm || true

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium & Dependencies
        run: |
          npm install -g appium
          appium driver install uiautomator2 || true
          cd mobile/test_appium
          npm install || npm install exceljs

      - name: Build Android Debug APK
        run: |
          if [ -f "mobile/android/gradlew" ]; then
            cd mobile/android
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon
          else
            echo "Skipping native gradle build step if APK already bundled."
          fi

      - name: Run Appium Tests on Android Emulator (API 29)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          script: bash mobile/test_appium/scripts/ci_run_tests.sh

      - name: Upload Excel Test Report (.xlsx) Ready for Download
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Mobile_Appium_E2E_Test_Report
          path: mobile/test_appium/reports/*.xlsx
          retention-days: 90

      - name: Prepare HTML Report Staging for gh-pages
        if: always()
        run: |
          mkdir -p public_reports/reports/latest
          mkdir -p public_reports/reports/history/build-${{ github.run_number }}
          if [ -d "mobile/test_appium/reports" ]; then
            cp -r mobile/test_appium/reports/* public_reports/reports/latest/ || true
            cp -r mobile/test_appium/reports/* public_reports/reports/history/build-${{ github.run_number }}/ || true
          fi

      - name: Deploy HTML Reports to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        if: always()
        with:
          folder: public_reports
          branch: gh-pages
          target-folder: .
