name: Android Mobile Appium E2E Testing & Report Deployment

on:
  push:
    branches: [ main, master ]
    paths:
      - 'mobile/**'
      - '.github/workflows/android-e2e.yml'
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  android-e2e-tests:
    name: Run Appium 1,111 Mobile E2E Tests & Deploy Reports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium & Excel Reporter Dependencies
        run: |
          cd mobile/test_appium
          npm install || npm install exceljs

      - name: Fast Execute Appium 1,111 Mobile E2E Test Suite
        run: |
          bash mobile/test_appium/scripts/ci_run_tests.sh

      - name: Upload Excel Test Report (.xlsx) Ready for Download
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Mobile_Appium_E2E_Test_Report
          path: mobile/test_appium/reports/*.xlsx
          retention-days: 90

      - name: Prepare HTML Report Staging for gh-pages
        if: always()
        run: |
          mkdir -p public_reports/reports/latest
          mkdir -p public_reports/reports/history/build-${{ github.run_number }}
          if [ -d "mobile/test_appium/reports" ]; then
            cp -r mobile/test_appium/reports/* public_reports/reports/latest/ || true
            cp -r mobile/test_appium/reports/* public_reports/reports/history/build-${{ github.run_number }}/ || true
          fi

      - name: Deploy HTML Reports to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        if: always()
        with:
          folder: public_reports
          branch: gh-pages
          target-folder: .
